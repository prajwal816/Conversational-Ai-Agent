server:
  host: "0.0.0.0"
  port: 8000
  websocket_endpoint: "/ws"

asr:
  model_id: "openai/whisper-tiny"
  chunk_duration_ms: 100
  sample_rate: 16000
  simulated_latency_ms: 10

llm:
  model_id: "distilgpt2"
  max_new_tokens: 50
  temperature: 0.7
  repetition_penalty: 1.1
  # Streaming settings
  stream_tokens: true
  simulated_ttft_ms: 80
  simulated_inter_token_ms: 5

rag:
  embedding_model: "all-MiniLM-L6-v2"
  faiss_index_type: "l2"
  top_k: 2

dialogue:
  max_history_turns: 5

latency_targets:
  turn_taking_delay_ms: 100
